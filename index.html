
<!DOCTYPE html>
<html>
<link
href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&display=swap"
rel="stylesheet">
<head>
    <title> DSA Visualizer </title>
    <link rel="stylesheet" href="style.css">
    
</head>
<body>
<div class="main">

    <h1 class="title">
        SORTING VISUALIZER
    </h1>

    <div class="controls">

        <div class="left-controls">

            <button
            class="generateBtn"
            id="generate">

                Generate Array

            </button>

            <button
            class="sortBtn"
            id="sort">

                Bubble Sort

            </button>

            <button
            class="selectionBtn"
            id="selection">

                Selection Sort

            </button>

            <button
            class="insertionBtn"
            id="insertion">

                Insertion Sort

            </button>

            

        </div>

        <div class="right-controls">

            <div class="slider-box">

                <span id="sizeText">
                    Size
                </span>

                <input
                type="range"
                id="size"
                min="5"
                max="80"
                value="30">

            </div>
            

            <div class="slider-box">

                <span id="speedText">
                    Speed
                </span>

                <input
                type="range"
                id="speed"
                min="1"
                max="1000"
                value="500">

            </div>

        </div>

    </div>


</div>
  <div id="complexityCard">

    <h3 id="algoTitle">
        Algorithm Information
    </h3>

    <p id="bestCase">
        Best Case :
    </p>

    <p id="averageCase">
        Average Case :
    </p>

    <p id="worstCase">
        Worst Case :
    </p>

    <p id="spaceComplexity">
        Space :
    </p>

</div>
<div id="container"></div>
<script src="bubblesort.js"></script>
<script src="selectionsort.js"></script>
<script src="insertionsort.js"></script>
<script src="script.js"></script>


</body>
</html>
